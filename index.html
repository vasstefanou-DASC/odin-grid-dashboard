<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/styles.css">
    <title>Grid Dashboard</title>
</head>
<body>
    <div class="grid-container">
        <header>
            <div class="topleft">
                <img src="svgs/magnify.svg"><input type="text" placeholder="search..">
            </div>
            <div class="topright">
                <img src="svgs/bell-ring-outline.svg">
                <img class="profile" src="svgs/squirrel_9308985.png">
                <span>Morgan Oakley</span>
            </div>
            <div class="botleft">
                <img class="profile2" src="svgs/squirrel_9308985.png">
                <p>Hi there,<br>Morgan Oakley (@morgan)</p>
                
            </div>
            <div class="botright">
                <button type="button">New</button>
                <button type="button">Upload</button>
                <button type="button">Share</button>
            </div>
        </header>
        <div class="sidebar">
            <h1><img src="svgs/view-dashboard.svg">Dashboard</h1>
            <ul>
                <li><img src="svgs/home-account.svg">Home</li>
                <li><img src="svgs/id-card.svg">Profile</li>
                <li><img src="svgs/message.svg">Messages</li>
                <li><img src="svgs/history.svg">History</li>
                <li><img src="svgs/checkbox-marked-circle-auto-outline.svg">Tasks</li>
                <li><img src="svgs/account-group-outline.svg">Communities</li>
            </ul>
            <ul>
                <li><img src="svgs/cog-outline.svg">Settings</li>
                <li><img src="svgs/frequently-asked-questions.svg">Support</li>
                <li><img src="svgs/shield-account.svg">Privacy</li>
            </ul>
        </div>
        <main>
        </main>
    </div>
</body>
</html>
